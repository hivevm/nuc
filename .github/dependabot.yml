# Keeps the SHA-pinned GitHub Actions in .github/workflows/ current (ADR-0004): Dependabot
# updates the commit SHA and its trailing version comment together. The commit-message prefix
# yields Conventional-Commit-valid subjects ("build(deps): …") per ADR-0003.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: build
      include: scope
